[advisories]
db-url = "https://github.com/rustsec/advisory-db"
db-path = "~/.cargo/advisory-db"
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
yanked = "warn"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "CC0-1.0",
    "Zlib",
]
deny = []
copyleft = "deny"
allow-osi-fsf-free = "neither"
default = "deny"
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "versions"

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-git = []
