name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            suffix: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            suffix: ""
            cross: true
          - target: aarch64-apple-darwin
            runner: macos-latest
            suffix: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            suffix: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build tylluan-nexus (release)
        run: cargo build --release -p tylluan-kernel --target ${{ matrix.target }}

      - name: Build tylluan-cli (release)
        run: cargo build --release -p tylluan-cli --target ${{ matrix.target }}

      - name: Prepare artifacts
        shell: bash
        run: |
          SUFFIX="${{ matrix.suffix }}"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/tylluan-nexus$SUFFIX dist/
          cp target/${{ matrix.target }}/release/tylluan-cli$SUFFIX dist/
          cp README.md dist/
          cp LICENSE dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tylluan-${{ matrix.target }}
          path: dist/

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Package and checksum
        shell: bash
        run: |
          set -e
          for dir in tylluan-*; do
            platform="${dir#tylluan-}"
            archive="tylluan-${platform}.tar.gz"
            cd "$dir"
            sha256sum tylluan-nexus* tylluan-cli* > checksums.txt
            tar czf "../$archive" .
            cd ..
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: tylluan-*.tar.gz
          generate_release_notes: true
