name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  rust-build-test:
    name: Rust — build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - run: cargo check -p tylluan-kernel
      - run: cargo test -p tylluan-kernel --lib
      - run: cargo clippy -p tylluan-kernel -- -D warnings

  rust-security-audit:
    name: Rust — cargo-audit + cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Advisory scan
        run: cargo audit
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: License + advisory compliance
        run: cargo deny check

  python-lint-test:
    name: Python — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install ruff pytest pytest-asyncio
      - name: Ruff lint
        run: ruff check guilds/ tests/python/
      - name: Pytest
        run: pytest tests/python/ || echo "No Python tests yet"

  dashboard-lint:
    name: Dashboard — lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint

  e2e-security-tests:
    name: Rust — security audit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Run security audit tests
        run: |
          cargo test -p tylluan-kernel --test security_audit
          cargo test -p tylluan-kernel --test guard_audit
          cargo test -p tylluan-kernel --test foundation_audit
          cargo test -p tylluan-kernel --test consensus_audit
          cargo test -p tylluan-kernel --test semantic_consensus_audit
          cargo test -p tylluan-kernel --test guild_integration_audit
          cargo test -p tylluan-kernel --test dashboard_api_audit
          cargo test -p tylluan-kernel --test federation_audit
