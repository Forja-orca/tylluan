name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  rust-build-test:
    name: Rust — build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - run: cargo check -p tylluan-kernel
      - run: cargo test -p tylluan-kernel --lib
      - run: cargo clippy -p tylluan-kernel -- -D warnings

  rust-security-audit:
    name: Rust — cargo-deny (licenses + advisories + bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Bans + licenses + sources
        run: cargo deny check bans licenses sources
      - name: Advisory scan (informational — see deny.toml to ignore specific RUSec IDs)
        run: cargo deny check advisories

  python-lint-test:
    name: Python — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install ruff pytest pytest-asyncio
      - name: Ruff lint
        run: ruff check guilds/ tests/python/
      - name: Pytest
        run: pytest tests/python/ || echo "No Python tests yet"

  dashboard-lint:
    name: Dashboard — lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: "10"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  portability-check:
    name: Rust — ARM64 portability (aarch64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-unknown-linux-gnu

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Check tylluan-kernel (ARM64)
        run: cargo check -p tylluan-kernel --target aarch64-unknown-linux-gnu

      - name: Check tylluan-cli (ARM64)
        run: cargo check -p tylluan-cli --target aarch64-unknown-linux-gnu

  e2e-security-tests:
    name: Rust — security audit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Generate DB Encryption Key for CI
        run: |
          # Generate a safe 64-character hex key (32 bytes) for SQLCipher tests
          echo "TYLLUAN_DB_KEY=$(openssl rand -hex 32)" >> $GITHUB_ENV
      - name: Run security audit tests
        run: |
          cargo test -p tylluan-kernel --test security_audit
          cargo test -p tylluan-kernel --test guard_audit
          cargo test -p tylluan-kernel --test foundation_audit
          cargo test -p tylluan-kernel --test consensus_audit
          cargo test -p tylluan-kernel --test semantic_consensus_audit
          cargo test -p tylluan-kernel --test guild_integration_audit
          cargo test -p tylluan-kernel --test dashboard_api_audit
          cargo test -p tylluan-kernel --test federation_audit
          cargo test -p tylluan-kernel --test mesh_audit
