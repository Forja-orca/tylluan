# TylluanNexus o3 Sovereign Configuration Example
# Copy this to tylluan.toml and customize it.

[nexus]
host = "127.0.0.1"
port = 3000
transport = ["stdio", "http"]

# Security timeouts for tool execution and handshakes
[nexus.timeouts]
handshake_secs = 30
tool_call_secs = 120
lazy_load_timeout_secs = 180

[memory]
db_path = "data/tylluan.db"
embedding_model = "bge-m3"
# CRITICAL: BGE-M3 nativo es 1024 dimensiones. NUNCA cambiar a 768.
# 768 es el bug heredado de ForjaMCPo3 (Matryoshka reduction). Tylluan arranca limpio.
vector_dimensions = 1024
# Max vector search results before partitioning
vector_limit = 5000

[guilds.core]
# Always spawned on startup
always_on = ["bash", "filesystem"]
# Seconds before an idle lazy guild is considered for suspension
idle_suspend_secs = 3600

[performance]
# Reindexing interval (secs) - 600s recommended for low-RAM hardware
reindex_interval_secs = 600
# Node weight decay interval (secs)
decay_interval_secs = 300
# SQLite WAL checkpoint interval (secs)
checkpoint_interval_secs = 300

# Security: Sandbox, Access Control & Encryption
[security]
# Block dangerous intents (rm -rf, DROP TABLE, fork bombs, etc.)
# intent_filter = true
# Encrypt SQLite databases at rest using SQLCipher (AES-256)
# Requires TYLLUAN_DB_KEY environment variable with the encryption passphrase.
# WARNING: If you enable this on an existing database, you must migrate it first.
# encrypt_at_rest = false

# Docker sandbox for bash/code guilds (opt-in, disabled by default)
# When enabled, bash and code guilds run in an isolated Docker container
# instead of directly on the host system.
[security.sandbox]
enabled = false
image = "python:3.12-slim"
memory = "512m"
network = false
timeout_secs = 30

# Per-Guild ACL (optional, opt-in)
# When configured, restricts which guilds each token/role can access.
# If this section is absent or empty, all guilds are accessible (backwards-compatible).
[security.acl]
# default_role applies to the bearer token when not listed in [security.acl.tokens]
default_role = "admin"

# Define roles and their allowed guilds
[security.acl.roles]
reader = ["knowledge", "coloquio", "monitor", "websearch"]
writer = ["knowledge", "coloquio", "monitor", "websearch", "filesystem", "git", "code_analysis"]
admin = ["*"]

# Map specific tokens to roles (use in place of or alongside default_role)
# [security.acl.tokens]
# "my-reader-token-here" = "reader"
# "my-writer-token-here" = "writer"

